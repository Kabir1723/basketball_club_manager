databases:
  - name: pcte-basketball-db
    plan: free

services:
  - type: web
    name: pcte-basketball
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pcte-basketball-db
          property: connectionString
