<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log In - PCTE Basketball Club Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav>
    <h1 class="shiny-text">PCTE Basketball Club Manager</h1>
    <p class="owner">Owned by Mr. President Kabir</p>
  </nav>
  <main>
    <h2>Log In</h2>
    <p class="page-note">Admins manage accounts, coaches make changes, viewers can only look around.</p>
    <form id="loginForm" style="max-width:380px;">
      <label>
        Username
        <input type="text" id="username" autocomplete="username" required />
      </label>
      <label>
        Password
        <input type="password" id="password" autocomplete="current-password" required />
      </label>
      <p id="loginError" style="color:#ff6b6b; display:none;"></p>
      <button type="submit">Log In</button>
    </form>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';
      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value
        })
      }).then(function (res) {
        return res.json().then(function (body) { return { ok: res.ok, body: body }; });
      }).then(function (r) {
        if (!r.ok) {
          errorEl.textContent = r.body.error || 'Login failed';
          errorEl.style.display = 'block';
          return;
        }
        var params = new URLSearchParams(window.location.search);
        var next = params.get('next');
        window.location.href = (next && next.startsWith('/')) ? next : '/';
      }).catch(function () {
        errorEl.textContent = 'Could not reach the server. Try again.';
        errorEl.style.display = 'block';
      });
    });
  </script>
</body>
</html>
