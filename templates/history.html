<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Results - PCTE Basketball Club Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <nav>
    <h1 class="shiny-text">PCTE Basketball Club Manager</h1>
    <p class="owner">President Kabir · 2025–26 Season</p>
    <div id="pillNavRoot"></div>
  </nav>
  <main>
    <h2>Past Games History</h2>
    <p class="page-note">Full record of every saved game, with the option to delete a mistaken entry.</p>
    <div class="table-scroll">
      <table id="historyTable">
        <thead>
          <tr>
            <th>Date &amp; Time</th>
            <th>Teams</th>
            <th>Score</th>
            <th>Fouls (Team 1)</th>
            <th>Fouls (Team 2)</th>
            <th>Individual Fouls</th>
            <th>MVP 🔱</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>
  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="{{ url_for('static', filename='js/ferrofluid.js') }}"></script>
  <script src="{{ url_for('static', filename='js/magicbento.js') }}"></script>
  <script src="{{ url_for('static', filename='js/pillnav.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/modal.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  <script src="{{ url_for('static', filename='js/history.js') }}"></script>
</body>
</html>
